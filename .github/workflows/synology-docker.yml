name: Synology Docker Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish, for example v1.3.0'
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: synology-docker-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build GHCR amd64 image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve image version
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [ -z "$version" ]; then
            echo "Version is required." >&2
            exit 1
          fi
          if [ "$version" = "latest" ]; then
            echo "This workflow publishes version tags only, not latest." >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker tag: $version" >&2
            exit 1
          fi

          image="ghcr.io/${GITHUB_REPOSITORY,,}-synology"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=synology-amd64
          cache-to: type=gha,mode=max,scope=synology-amd64
